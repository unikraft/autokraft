name: Testing framework

on:
  repository_dispatch:
    types: [uk_pr_test]

jobs:
  pr-test:
    runs-on: ubuntu-latest
    steps:
      - name: Dump client_payload
        run: |
          echo "client_payload: ${{ toJson(github.event.client_payload) }}"

      - name: Record start time
        id: start_time
        run: echo "start_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Parse target repo owner and name
        id: parse_repo
        run: |
          set -euo pipefail
          REPO="${{ github.event.client_payload.pr_repo_name }}"
          OWNER="${REPO%%/*}"
          NAME="${REPO#*/}"
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$NAME" >> $GITHUB_OUTPUT
          echo "Parsed owner=$OWNER repo=$NAME"

      - name: Generate GitHub App Token
        if: github.event_name == 'repository_dispatch'
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_REPORT_APP_ID }}
          private-key: ${{ secrets.CI_REPORT_APP_PRIVATE_KEY }}
          owner: ${{ steps.parse_repo.outputs.owner }}
          repositories: ${{ steps.parse_repo.outputs.repo }}

      - name: Retrieve PR details (head SHA)
        id: get_pr
        uses: octokit/request-action@v2.x
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token || secrets.GITHUB_TOKEN }}
        with:
          route: GET /repos/{owner}/{repo}/pulls/{pull_number}
          owner: ${{ steps.parse_repo.outputs.owner }}
          repo: ${{ steps.parse_repo.outputs.repo }}
          pull_number: ${{ github.event.client_payload.pr_number }}
        continue-on-error: true

      - name: Create Initial Check Run
        if: github.event_name == 'repository_dispatch' && steps.generate_token.outputs.token != ''
        uses: octokit/request-action@v2.x
        id: create_check
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        with:
          route: POST /repos/{owner}/{repo}/check-runs
          owner: ${{ steps.parse_repo.outputs.owner }}
          repo: ${{ steps.parse_repo.outputs.repo }}
          name: "Autokraft PR Testing Framework"
          head_sha: ${{ fromJson(steps.get_pr.outputs.data || '{}').head.sha || github.event.client_payload.pr_sha || github.sha }}
          status: 'in_progress'
          started_at: ${{ steps.start_time.outputs.start_time }}
          output: |
            {
              "title": "Tests are running...",
              "summary": "Autokraft PR testing framework triggered. Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Check sudo access
        run: |
          if sudo -n true 2>/dev/null; then
            echo "sudo is passwordless"
          else
            echo "sudo requires password"
          fi

      - name: Fetch PR via refs/pull and checkout
        env:
            PR_REPO: ${{ github.event.client_payload.pr_repo_name }}
            PR_NUM: ${{ github.event.client_payload.pr_number }}
            TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN || '' }}
        run: |
            # Exit on error, treat unset variables as errors, and fail pipelines on first failed command
            set -euo pipefail
            pwd
            echo "Workspace: $GITHUB_WORKSPACE"
            # Choose an authenticated remote only when a token is provided
            if [ -n "$TOKEN" ]; then
              remote="https://x-access-token:${TOKEN}@github.com/${PR_REPO}.git"
            else
              remote="https://github.com/${PR_REPO}.git"
            fi

            echo "Fetching refs/pull/${PR_NUM}/head from ${PR_REPO} into unikraft/"
            # create target dir and fetch the PR head into it (keeps workspace root clean)
            cd ..
            mkdir -p unikraft
            cd unikraft
            git init .
            git remote add origin "$remote"
            # fetch the PR head ref into a local branch 'pr-branch' (shallow)
            if git fetch --no-tags --depth=1 origin "refs/pull/${PR_NUM}/head:pr-branch"; then
              echo "Fetched via refs/pull/${PR_NUM}/head"
              git checkout pr-branch
            else
              echo "Fallback: attempting fetch via provided pr_head_ref"
              HEAD_REF="${{ github.event.client_payload.pr_head_ref }}"
              # pr_head_ref may include owner/ prefix; strip if present
              STRIPPED_REF="${HEAD_REF##*/}"
              echo "Using branch name: $STRIPPED_REF"
              git fetch --no-tags --depth=1 origin "$STRIPPED_REF:pr-branch"
              git checkout pr-branch
            fi
            echo "Now at commit: $(git rev-parse HEAD)"
            # return to workspace root so following steps run from repo root
            cd - >/dev/null

      - name: Clone Unikraft catalog repository (sibling directory)
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ..
          git clone --depth=1 https://github.com/unikraft/catalog.git catalog
          echo "catalog HEAD: $(git -C catalog rev-parse HEAD)"

      - name: Checkout Autokraft repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies in venv
        run: |
          set -e
          python3 -m venv testing-fw-venv
          source testing-fw-venv/bin/activate
          python3 -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v3

      - name: Enable Docker BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Install base dependencies
        run: |
          sudo apt -y update
          sudo apt install -y --no-install-recommends \
            build-essential \
            sudo \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libncurses-dev \
            libyaml-dev \
            flex \
            bison \
            git \
            wget \
            curl \
            uuid-runtime \
            qemu-kvm \
            qemu-system-x86 \
            qemu-system-arm \
            sgabios \
            libarchive-tools \
            clang \
            xen-utils \
            redis-tools

      - name: Install KraftKit (APT)
        run: |
          set -euo pipefail
          # Prereqs
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            gnupg \
            lsb-release

          # Add Unikraft's GPG key
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://deb.pkg.kraftkit.sh/gpg.key | \
            sudo gpg --dearmor -o /etc/apt/keyrings/unikraft.gpg

          # Add APT repo
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/unikraft.gpg] https://deb.pkg.kraftkit.sh /" | \
            sudo tee /etc/apt/sources.list.d/unikraft.list > /dev/null

          # Install kraftkit
          sudo apt-get update
          sudo apt-get install -y kraftkit

      - name: Verify KraftKit installation
        run: |
          set -e
          kraft version

      - name: Setup QEMU networking
        run: |
          test -d /etc/qemu || sudo mkdir -p /etc/qemu
          echo "allow all" | sudo tee /etc/qemu/bridge.conf

      - name: Install Firecracker
        run: |
          release_url="https://github.com/firecracker-microvm/firecracker/releases"
          latest=v1.7.0
          curl -L ${release_url}/download/${latest}/firecracker-${latest}-$(uname -m).tgz | tar -xz
          sudo cp release-${latest}-$(uname -m)/firecracker-${latest}-$(uname -m) /usr/local/bin/firecracker-${latest}-$(uname -m)
          sudo ln -sfn /usr/local/bin/firecracker-${latest}-$(uname -m) /usr/local/bin/firecracker-$(uname -m)
          sudo usermod -a -G kvm $USER

      - name: Prepare maintainer-tools and populate workdir
        env:
          TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN || '' }}
          WORKDIR: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "Workspace: $WORKDIR"

          # 1) Clone maintainer-tools repo (use token if provided)
          if [ -n "${TOKEN:-}" ]; then
            MT_REMOTE="https://x-access-token:${TOKEN}@github.com/unikraft-upb/maintainer-tools.git"
          else
            MT_REMOTE="https://github.com/unikraft-upb/maintainer-tools.git"
          fi

          echo "Cloning maintainer-tools from $MT_REMOTE ..."
          # ensure we start from a clean place
          rm -rf maintainer-tools || true
          git clone --depth=1 "$MT_REMOTE" maintainer-tools

          # 2) Run clone-all.sh in workdir/apps
          APPS_DIR="maintainer-tools/workdir/apps"
          if [ ! -d "$APPS_DIR" ]; then
            echo "ERROR: expected $APPS_DIR to exist after clone; listing maintainer-tools:"
            ls -la maintainer-tools || true
            exit 1
          fi

          echo "Running clone-all.sh in $APPS_DIR ..."
          cd "$APPS_DIR"
          chmod +x ./clone-all.sh || true
          ./clone-all.sh

          # 3) Create symlink app-elfloader -> elfloader (if elfloader exists)
          if [ -d "elfloader" ]; then
            ln -snf elfloader app-elfloader
            echo "Created/updated symlink: app-elfloader -> elfloader"
          else
            echo "WARNING: elfloader directory not found in $APPS_DIR — listing contents:"
            ls -la
            # not fatal; continue so user can inspect logs
          fi

          # 4) Run fill-workdir.sh from maintainer-tools/workdir
          echo "Running fill-workdir.sh ..."
          cd ../   # now in maintainer-tools/workdir
          if [ -f ./fill-workdir.sh ]; then
            chmod +x ./fill-workdir.sh || true
            ./fill-workdir.sh
          else
            echo "ERROR: fill-workdir.sh not found in $(pwd)"
            ls -la
            exit 1
          fi

          # 5) Return to repo workspace root
          cd "$WORKDIR"

      - name: Replace maintainer-tools workdir/unikraft using tar
        run: |
          set -euo pipefail
          pwd
          WORKDIR="${GITHUB_WORKSPACE:-$(pwd)}"
          SRC="$WORKDIR/../unikraft"
          TGT="$WORKDIR/maintainer-tools/workdir/unikraft"

          echo "Source: $SRC"
          echo "Target: $TGT"

          if [ ! -d "$SRC" ]; then
            echo "ERROR: source directory $SRC does not exist"
            exit 1
          fi

          # remove old target, recreate
          rm -rf "$TGT"
          mkdir -p "$TGT"

          # copy contents, excluding .git (preserves symlinks, timestamps, perms)
          tar --exclude='.git' -C "$SRC" -cf - . | tar -C "$TGT" -xpf -

          echo "Done. Target listing:"
          ls -la "$TGT"

      - name: Run overall_test.py
        run: |
          source testing-fw-venv/bin/activate
          cat > src/config.yaml <<EOF
          source:
            base: $(pwd)/maintainer-tools/workdir
          EOF
          ${{ vars.TEST_COMMAND }} --catalog-path /home/runner/work/autokraft/catalog/library

      - name: Upload CI report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 30
          path: |
            .sessions/

      - name: Show ci_report.json (if present)
        if: always()
        run: |
          REPORT=/home/runner/work/autokraft/autokraft/.sessions/ci_report.json
          if [ -f "$REPORT" ]; then
            echo "---- ci_report.json start ----"
            cat "$REPORT"
            echo "---- ci_report.json end ----"
          else
            echo "ci_report.json not found at $REPORT"
          fi

      - name: Record completion time
        id: completion_time
        if: always()
        run: echo "completion_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Derive result (simple)
        id: run-tests
        if: always()
        run: |
          # Placeholder: decide result based on overall job status
          JS="${{ job.status }}"
          case "$JS" in
            success) echo 'result=success' >> $GITHUB_OUTPUT; echo 'result_upper=SUCCESS' >> $GITHUB_OUTPUT;;
            cancelled) echo 'result=cancelled' >> $GITHUB_OUTPUT; echo 'result_upper=CANCELED' >> $GITHUB_OUTPUT;;
            *) echo 'result=failure' >> $GITHUB_OUTPUT; echo 'result_upper=FAILURE' >> $GITHUB_OUTPUT;;
          esac

      - name: Update Final Check Run
        if: always() && steps.create_check.outputs.data != ''
        uses: octokit/request-action@v2.x
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        with:
          route: PATCH /repos/{owner}/{repo}/check-runs/${{ fromJson(steps.create_check.outputs.data).id }}
          owner: ${{ steps.parse_repo.outputs.owner }}
          repo: ${{ steps.parse_repo.outputs.repo }}
          name: "Autokraft: PR Testing Framework"
          status: 'completed'
          conclusion: ${{ steps.run-tests.outputs.result || job.status }}
          started_at: ${{ steps.start_time.outputs.start_time }}
          completed_at: ${{ steps.completion_time.outputs.completion_time }}
          output: |
            {
              "title": "Autokraft: PR Testing Framework: ${{ steps.run-tests.outputs.result_upper }}",
              "summary": "Full workflow logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

